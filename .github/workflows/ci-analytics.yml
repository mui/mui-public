name: CI analytics

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions: {}

jobs:
  collect-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout ci-data branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ci-data
          path: ci-data-ws
          # If the branch doesn't exist, this step will fail.
          # Create it with:
          #   git checkout --orphan ci-data
          #   git clean -fdx
          #   echo '[]' > index.json
          #   mkdir ci-reports
          #   git add .
          #   git commit -m "init ci-data branch"
          #   git push origin ci-data

      - name: Collect CI metrics
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          mkdir -p ci-data-ws/ci-reports
          curl -sf "https://frontend-public.mui.com/api/ci-analytics/collect?fresh=true" > "ci-data-ws/ci-reports/${TIMESTAMP}.json"
          cp "ci-data-ws/ci-reports/${TIMESTAMP}.json" ci-data-ws/ci-reports/latest.json

          # Update index.json with the new timestamp
          cd ci-data-ws
          node -e "
            const fs = require('fs');
            const index = JSON.parse(fs.readFileSync('index.json', 'utf8'));
            index.push('${TIMESTAMP}');
            fs.writeFileSync('index.json', JSON.stringify(index, null, 2));
          "

      - name: Commit and push ci-data
        run: |
          cd ci-data-ws
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "CI analytics snapshot $(date -u +%Y-%m-%d)"
          git push origin ci-data
