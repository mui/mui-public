name: PR Releases

on:
  workflow_call:
    inputs:
      # For backwards compatibility
      node-version:
        description: 'Node.js version to use'
        required: false
        type: string
        default: ''
      pr-comment:
        description: 'Allows comments from pkg.pr.new bot'
        type: boolean
        required: false
        default: false

permissions: {}

jobs:
  pkg-releases:
    name: pkg.pr.new releases
    if: ${{ github.repository_owner == 'mui' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "${{ github.actor }}"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # fetch all tags which are required for `pnpm release:changelog`
          fetch-depth: 0
      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - name: Use specific Node.js version
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: ${{ inputs.node-version != '' }}
        with:
          node-version: ${{ inputs.node-version }}
      - name: Use Node.js version from repo
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: ${{ inputs.node-version == '' }}
        with:
          node-version-file: 'package.json'
          # https://github.com/actions/setup-node/blob/main/docs/advanced-usage.md#caching-packages-dependencies
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm release:build
      - name: Publish packages to pkg.pr.new
        uses: mui/mui-public/.github/actions/ci-publish@dd7db35e4c70c656b86a98cf9b4819e7a4105f48 # master
        with:
          pr-comment: ${{ inputs.pr-comment }}
