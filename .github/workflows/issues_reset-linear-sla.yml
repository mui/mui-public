name: Reset Linear SLA on team comment

on:
  workflow_call:
    inputs:
      dry-run:
        description: 'Log what would happen without updating the SLA in Linear'
        type: boolean
        required: false
        default: false
    secrets:
      LINEAR_API_KEY:
        description: 'Linear API key used to look up and reset the SLA of the synced issue'
        required: true

permissions: {}

jobs:
  reset-sla:
    runs-on: ubuntu-latest
    name: Check commenter and reset Linear SLA
    # issue_comment also fires on PR comments — only run for real issues
    if: ${{ !github.event.issue.pull_request }}
    permissions:
      contents: read
    steps:
      - name: Check out mui-public repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Check this repository out, otherwise the script won't be available,
          # as it otherwise checks out the repository where the workflow caller is located
          repository: mui/mui-public
      - name: Reset Linear SLA
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          DRY_RUN: ${{ inputs.dry-run && 'true' || 'false' }}
        with:
          script: |
            const script = require('./.github/workflows/scripts/issues/resetLinearSla.js');
            await script({core, github, context});
