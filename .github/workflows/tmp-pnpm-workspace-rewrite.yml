# TEMPORARY: exercises the partial-publish flow (code-infra `publish`) against a
# shallow clone of a real mui repo, mutating package versions and the CHANGELOG to
# cover: arbitrary publish, github-release with/without a changelog entry, and the
# release-already-exists guard. Runs with --dry-run, so no npm/GitHub writes happen
# (createRelease is skipped, GitHub calls are read-only, tag push is --dry-run).
# The npm-publish substep may fail on real repos that publish from a build/ dir; the
# changelog/release validations run *before* publish, so those scenarios still report.
# Delete once the partial-publish flow is reviewed.
name: tmp / publish flow scenarios (real repos)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/tmp-pnpm-workspace-rewrite.yml'

permissions:
  contents: read

jobs:
  scenarios:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - mui/base-ui
          - mui/material-ui
    env:
      MAIN: ${{ github.workspace }}/main
      TARGET: ${{ github.workspace }}/target
      NEW_VERSION: '99.0.0'
    steps:
      - name: Checkout mui-public (this repo)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: main

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 11.1.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.22.3

      - name: Install mui-public deps (for code-infra CLI)
        working-directory: ${{ env.MAIN }}
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Clone ${{ matrix.repo }} (shallow, latest only)
        run: git clone --depth 1 "https://github.com/${{ matrix.repo }}.git" "$TARGET"

      - name: Install target deps (skip lifecycle scripts)
        working-directory: ${{ env.TARGET }}
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Run publish-flow scenarios
        working-directory: ${{ env.TARGET }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ matrix.repo }}
        run: |
          set -uo pipefail
          CLI="$MAIN/packages/code-infra/bin/code-infra.mjs"
          ORIG_VERSION="$(node -p "require('$TARGET/package.json').version")"
          # Pick a leaf public package: no workspace deps, so dependency-completeness
          # validation passes when filtering to just it (no co-publish required).
          LEAF_PUBLIC="$(pnpm ls -r --depth -1 --json | node -e "
            const fs = require('fs');
            const pkgs = JSON.parse(fs.readFileSync(0, 'utf8'));
            const names = new Set(pkgs.map((p) => p.name).filter(Boolean));
            const leaf = pkgs.find((p) => {
              if (!p.name || p.private || p.path === '$TARGET') return false;
              const pj = JSON.parse(fs.readFileSync(p.path + '/package.json', 'utf8'));
              return !Object.keys(pj.dependencies || {}).some((d) => names.has(d));
            });
            process.stdout.write(leaf ? leaf.name : '');
          ")"
          echo "repo=$REPO root version=$ORIG_VERSION leaf public pkg=$LEAF_PUBLIC"

          reset() {
            git -C "$TARGET" checkout -- . >/dev/null 2>&1 || true
            git -C "$TARGET" clean -fdq >/dev/null 2>&1 || true
          }
          bump_root() {
            node -e "const fs=require('fs');const p='$TARGET/package.json';const j=JSON.parse(fs.readFileSync(p));j.version='$1';fs.writeFileSync(p, JSON.stringify(j,null,2)+'\n');"
          }
          add_changelog() {
            # Prepend a fresh entry so parseChangelog finds `## <version>`.
            node -e "const fs=require('fs');const p='$TARGET/CHANGELOG.md';const prev=fs.existsSync(p)?fs.readFileSync(p,'utf8'):'# Changelog\n';fs.writeFileSync(p, '# Changelog\n\n## $1\n\n_$(date +%Y-%m-%d)_\n\nTest entry for scenario.\n\n'+prev.replace(/^# Changelog\n/, ''));"
          }

          echo "# Publish-flow scenarios — $REPO" >> "$GITHUB_STEP_SUMMARY"

          run_scenario() {
            local title="$1"; shift
            local expect="$1"; shift
            echo "::group::$title"
            echo "## $title" >> "$GITHUB_STEP_SUMMARY"
            echo "Expectation: $expect" >> "$GITHUB_STEP_SUMMARY"
            set +e
            out="$(node "$CLI" "$@" 2>&1)"
            code=$?
            set -e 2>/dev/null || true
            echo "$out"
            echo "exit code: $code"
            {
              echo ''
              echo '```'
              echo "$out" | tail -n 40
              echo '```'
              echo "exit code: \`$code\`"
              echo ''
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::endgroup::"
            reset
          }

          # 1) Arbitrary publish: bump one package, no --github-release, filtered.
          reset
          if [ -n "$LEAF_PUBLIC" ]; then
            # Bump the leaf package, add a matching per-package changelog entry
            # (runPartialPublish requires `packages/<pkg>/CHANGELOG.md` with `## <version>`),
            # and stub the publishConfig.directory manifest (these repos publish from build/,
            # which the --ignore-scripts clone never produced) so `pnpm publish` finds a manifest.
            node -e "const fs=require('fs');const {execSync}=require('child_process');const pkgs=JSON.parse(execSync('pnpm ls -r --depth -1 --json'));const t=pkgs.find(p=>p.name==='$LEAF_PUBLIC');const pjPath=t.path+'/package.json';const j=JSON.parse(fs.readFileSync(pjPath));const nv=j.version.replace(/\d+$/,(n)=>String(+n+1));j.version=nv;fs.writeFileSync(pjPath,JSON.stringify(j,null,2)+'\n');const cl=t.path+'/CHANGELOG.md';const prev=fs.existsSync(cl)?fs.readFileSync(cl,'utf8'):'# Changelog\n';fs.writeFileSync(cl,'# Changelog\n\n## '+nv+'\n\nTest entry for scenario.\n\n'+prev.replace(/^# Changelog\n/,''));const dir=j.publishConfig&&j.publishConfig.directory;if(dir){const out=t.path+'/'+dir;fs.mkdirSync(out,{recursive:true});const bm={...j};delete bm.publishConfig;delete bm.files;delete bm.scripts;fs.writeFileSync(out+'/package.json',JSON.stringify(bm,null,2)+'\n');}console.error('bumped',t.name,'->',nv);"
            run_scenario "Arbitrary publish (no github-release, --filter $LEAF_PUBLIC)" \
              "Publishes only the filtered package (dry-run); no release; tag only if v<root> is new" \
              publish --ci --dry-run --tag latest --filter "$LEAF_PUBLIC"
          fi

          # 2) GitHub release, changelog entry present, root bumped to a new version.
          reset
          bump_root "$NEW_VERSION"
          add_changelog "$NEW_VERSION"
          run_scenario "GitHub release WITH changelog entry (root $NEW_VERSION)" \
            "validateGitHubRelease passes (changelog found, release 404); proceeds to publish" \
            publish --ci --dry-run --github-release

          # 3) GitHub release, NO changelog entry for the bumped version.
          reset
          bump_root "$NEW_VERSION"
          run_scenario "GitHub release WITHOUT changelog entry (root $NEW_VERSION)" \
            "Hard error: 'Version $NEW_VERSION not found in changelog'" \
            publish --ci --dry-run --github-release

          # 4) GitHub release for an already-released version (root left unchanged).
          reset
          add_changelog "$ORIG_VERSION"
          run_scenario "GitHub release for existing version (root $ORIG_VERSION)" \
            "Hard error: 'GitHub release v$ORIG_VERSION already exists' (if that release exists upstream)" \
            publish --ci --dry-run --github-release
          reset
