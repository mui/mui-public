name: Renovate

# Hosted in this public repo on purpose: public-repo Actions minutes are free, whereas a
# private host would be billed per minute. So we avoid private repos for now — keep the
# App's install set public-only, since with LOG_LEVEL: debug below, processing a private
# repo here would leak its dependency/update activity into the public Actions logs.

on:
  workflow_dispatch:
  # Hourly is needed because each repo's own `schedule` (Sun/Mon/Fri, various hours)
  # filters what actually runs each hour — a coarser cron would miss those windows.
  schedule:
    - cron: '0 * * * *'

permissions: {}

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  # List the repos the App is installed on; emit them as a matrix.
  discover:
    runs-on: ubuntu-latest
    # Secrets live in the `renovate` environment.
    environment: renovate
    outputs:
      repositories: ${{ steps.list.outputs.repositories }}
    steps:
      - name: Generate a token from the Renovate GitHub App
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RENOVATE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          # owner with no `repositories:` => token spans every repo the App is
          # installed on. The App's "Only select repositories" install set is the
          # single source of truth for which repos the token can reach.
          owner: mui
      - name: List installed repositories
        id: list
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          repos=$(gh api --paginate /installation/repositories \
            --jq '.repositories[].full_name' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "repositories=$repos" >> "$GITHUB_OUTPUT"

  # One job per repo => one Node process per runner. A repo that OOMs or errors fails
  # only its own job (fail-fast: false), never the rest of the fleet.
  renovate:
    needs: discover
    runs-on: ubuntu-latest
    environment: renovate
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        repository: ${{ fromJson(needs.discover.outputs.repositories) }}
    steps:
      - name: Generate a token scoped to ${{ matrix.repository }}
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RENOVATE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          # `repositories` accepts owner-qualified names, so the full `owner/repo` from
          # the matrix is used verbatim here and in RENOVATE_REPOSITORIES below.
          repositories: ${{ matrix.repository }}
      - name: Self-hosted Renovate
        uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          token: ${{ steps.app-token.outputs.token }}
        env:
          RENOVATE_REPOSITORIES: ${{ matrix.repository }}
          RENOVATE_AUTODISCOVER: 'false' # the matrix is the fan-out now, not autodiscover
          RENOVATE_ONBOARDING: 'false' # never open onboarding PRs
          RENOVATE_REQUIRE_CONFIG: 'required' # skip installed repos without a Renovate config
          # Allowlist for postUpgradeTasks commands (globalOnly, can't be set in repo config).
          # Matches the Prettier pass in renovate/default.json. Anchored to avoid command injection.
          RENOVATE_ALLOWED_COMMANDS: '["^pnpm exec prettier --write [\\w./ -]+$"]'
          # Inject CI=true into postUpgradeTasks child processes. Without it, `pnpm exec` on pnpm 11
          # aborts the non-interactive node_modules purge (ERR_PNPM_ABORTED_REMOVE_MODULES_DIR_NO_TTY).
          # customEnvVariables (not allowedEnv) is required: Renovate runs in a Docker container that
          # the runner's CI=true never enters, so there is nothing for allowedEnv to forward.
          RENOVATE_CUSTOM_ENV_VARIABLES: '{"CI":"true"}'
          RENOVATE_USERNAME: 'code-infra-renovate[bot]'
          RENOVATE_GIT_AUTHOR: 'code-infra-renovate[bot] <290386390+code-infra-renovate[bot]@users.noreply.github.com>'
          LOG_LEVEL: debug
          # Link the PR body back to the run that produced it. The self-hosted logs always live in
          # this host repo (github.repository is mui/mui-public for every matrix job, not the target
          # repo), so the run URL is assembled from the Actions context — no Renovate templating
          # needed. Renovate rewrites the footer on each rebase, so the link tracks the latest run.
          RENOVATE_PR_FOOTER: >-
            This PR was generated by [self-hosted Renovate](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
