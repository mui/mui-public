name: Renovate

on:
  workflow_dispatch:
  # Hourly is needed because each repo's own `schedule` (Sun/Mon/Fri, various hours)
  # filters what actually runs each hour — a coarser cron would miss those windows.
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: read
  pull-requests: read
  issues: read

concurrency:
  group: renovate-dryrun
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    # Secrets live in the `renovate` environment.
    environment: renovate
    steps:
      - name: Generate a token from the Renovate GitHub App
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RENOVATE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          # owner with no `repositories:` => token spans every repo the App is
          # installed on. The App's "Only select repositories" install set is the
          # single source of truth for which repos the token can reach.
          owner: mui

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          token: ${{ steps.app-token.outputs.token }}
        env:
          # No repo list: the App token only reaches repos the App is installed on, and
          # autodiscover processes exactly those. The App's "Only select repositories"
          # install set is the single source of truth for what Renovate touches.
          RENOVATE_AUTODISCOVER: 'true'
          RENOVATE_ONBOARDING: 'false' # never open onboarding PRs
          RENOVATE_REQUIRE_CONFIG: 'required' # skip installed repos without a Renovate config
          RENOVATE_USERNAME: 'code-infra-renovate[bot]'
          RENOVATE_GIT_AUTHOR: 'code-infra-renovate[bot] <290386390+code-infra-renovate[bot]@users.noreply.github.com>'
          LOG_LEVEL: debug
