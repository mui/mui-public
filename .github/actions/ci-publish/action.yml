name: 'pkg.pr.new release'

description: 'Publishes a new release to pkg.pr.new and dry-runs npm publishing'

inputs:
  npm-dry-run:
    description: 'Run the npm publish flow in dry-run mode'
    type: boolean
    required: false
    default: false
  pr-comment:
    description: 'Configure comments from pkg.pr.new bot'
    type: boolean
    required: false
    default: false

runs:
  using: 'composite'
  steps:
    - name: Publish to pkg.pr.new
      shell: bash
      # Retry loop to mitigate against https://github.com/stackblitz-labs/pkg.pr.new/issues/316
      # Remove when pkg-pr-new does retries by itself
      # Found two issues on codesandbox related to compact URLs -
      # Related to pkg.pr.new compact urls: If we enable compact urls, the urls for our usage are compact and works for all our use cases. But any dependency of the package gets the long url (see this for @base-ui/react's depedency on utils package). Codesandbox treats this as a different version. This may result in the context mismatch error since the depedency package might also be installed directly but with compact url and both are treated differently.
      # A bug in Codesandbox's code transform: CSB's bundler has a scoping bug where it rewrites class field names that collide with import names. For example, in this file (lines 1 and 19), the class field timer = null in Transition.ts collides with import { timer } from '@mui/x-charts-vendor/d3-timer', causing the bundler to transform timer = null into (0, $csb__3_timer.timer) = null which is not correct. I fixed this in our code but there could be similar instances in other places which we won't know till we encounter an issue.
      run: |
        set +e
        for i in 1 2 3; do
          echo "Attempt $i to publish packages..."

          pnpm exec pkg-pr-new publish $(pnpm code-infra list-workspaces --public-only --output=path) --pnpm --packageManager=pnpm --peerDeps --template './examples/*' --comment=${{ inputs.pr-comment == 'true' && 'update' || 'off' }} --compact false

          exit_code=$?
          if [ $exit_code -eq 0 ]; then
            break
          elif [ $i -eq 3 ]; then
            echo "Command failed after $i attempts with exit code $exit_code."
            exit $exit_code
          else
            echo "Attempt $i failed (exit code $exit_code), retrying after 30 seconds..."
            sleep 30
          fi
        done

    # This step makes sure that publishing doesn't break over time due to changes in the environment or dependencies.
    - name: Dry run npm publishing
      if: ${{ inputs.npm-dry-run == 'true' }}
      # Tolerates the push permission error in dry-run explicitly
      env:
        IS_PUBLISH_TEST: 'true'
      run: |
        echo "Running npm publish in dry-run mode..."
        pnpm code-infra publish --ci --dry-run
      shell: bash
