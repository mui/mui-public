name: Publish preparation

description: Common setup steps for publishing MUI packages (after checkout)

inputs:
  node-version:
    description: 'Node.js version to set up.'
    required: false
    default: '22.22.3'

runs:
  using: composite
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
    - name: Setup Node.js
      uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
      with:
        node-version: ${{ inputs.node-version }}
        # https://github.com/actions/setup-node/blob/main/docs/advanced-usage.md#caching-packages-dependencies
        cache: 'pnpm'
        registry-url: 'https://registry.npmjs.org'
        package-manager-cache: false
    # Ensure npm 11.5.1 or later is installed
    - name: Update npm
      shell: bash
      run: npm install -g npm@latest
    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
    - name: Build packages
      shell: bash
      run: pnpm run release:build
