[build]
  publish = "netlify-placeholder"

  # Default build command.
  command = "echo 'building...'"

  # Decide when to build Netlify
  ignore = """cd ../../ && [ "$CONTEXT" = "deploy-preview" ] && git fetch origin master --depth=500 -q && git diff --quiet FETCH_HEAD...$COMMIT_REF -- apps/code-infra-dashboard packages/benchmark pnpm-lock.yaml"""

[dev]
  framework = "#custom"
  command = "pnpm -F @apps/code-infra-dashboard start"
  targetPort = 3000

[build.environment]
  NODE_VERSION = "22.23.1"

[functions]
  directory = "functions"
