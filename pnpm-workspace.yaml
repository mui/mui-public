packages:
  - 'packages/*'
  - 'apps/*'
  - 'test/*'
  - 'docs'
engineStrict: true
strictDepBuilds: true
allowBuilds:
  esbuild: true
  nx: true
  sharp: true
  unrs-resolver: true
  '@mui/x-telemetry': false
  core-js: false
  cpu-features: false
  ssh2: false
  core-js-pure: set this to true or false
updateNotifier: false
blockExoticSubdeps: true
minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - '@base-ui/*'
  - '@mui/*'
  # Renovate security update: piscina@5.2.0
  - piscina@5.2.0
  # Renovate security update: @babel/core@7.29.6
  - '@babel/core@7.29.6'
trustPolicy: no-downgrade
# Skip trust-policy checks for packages published more than 365 days ago.
# Several widely-used packages (semver, reselect, @octokit/*) dropped provenance attestation
# for specific releases, triggering false-positive trust-downgrade errors. Packages that old
# have had ample time for community review; supply-chain attacks are most relevant within a
# shorter window.
# TODO: drop once @babel/core stops depending on semver@^6.3.1 (no 6.x version has provenance);
# tracked by the broader npm provenance gap in legacy 6.x semver/reselect/@octokit releases.
trustPolicyIgnoreAfter: 525600
