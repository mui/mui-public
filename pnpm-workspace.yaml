packages:
  - 'packages/*'
  - 'apps/*'
  - 'test/*'
  - 'docs'
overrides:
  # This is a workaround for the issue when the same type refers to @types/eslint for one instance
  # and to eslint for another instance, causing a conflict.
  # This should not be an issue for end users, but it is a problem for the monorepo.
  '@types/eslint': 'npm:eslint@^9.39.4'
  # undici-types@6.21.0 dropped provenance attestation (present in earlier and later versions),
  # which triggers trustPolicy: no-downgrade. Force to latest 6.x which has provenance.
  undici-types: '6.25.0'
  # Security: force patched versions of transitive-only dependencies flagged by Dependabot.
  # These are pulled in by build/test tooling (jsdom, eslint, @actions/*) and are
  # not declared in any package.json, so they can only be remediated via overrides.
  undici@6: '^6.27.0'
  undici@7: '^7.28.0'
  form-data@4: '^4.0.6'
  tar@7: '^7.5.16'
  js-yaml@4: '^4.2.0'
  tmp: '^0.2.7'
engineStrict: true
strictDepBuilds: true
allowBuilds:
  esbuild: true
  nx: true
  sharp: true
  unrs-resolver: true
  '@mui/x-telemetry': false
  core-js: false
  cpu-features: false
  ssh2: false
updateNotifier: false
blockExoticSubdeps: true
minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - '@mui/internal-*'
  # Renovate security update: piscina@5.2.0
  - piscina@5.2.0
  # Renovate security update: @babel/core@7.29.6
  - '@babel/core@7.29.6'
trustPolicy: no-downgrade
# Skip trust-policy checks for packages published more than 365 days ago.
# Several widely-used packages (semver, reselect, @octokit/*) dropped provenance attestation
# for specific releases, triggering false-positive trust-downgrade errors. Packages that old
# have had ample time for community review; supply-chain attacks are most relevant within a
# shorter window.
# TODO: drop once @babel/core stops depending on semver@^6.3.1 (no 6.x version has provenance);
# tracked by the broader npm provenance gap in legacy 6.x semver/reselect/@octokit releases.
trustPolicyIgnoreAfter: 525600
